# Stubs de demonstração para Squads 2–4 (task 14 — demo local).
# Em produção, substituir pelos serviços reais; sempre validar JWT do Core no módulo.

server {
    listen 8080;
    server_name localhost;
    default_type application/json;

    location = /v1/fiscal/health {
        return 200 '{"success":true,"data":{"module":"finance-fiscal","squad":2,"status":"ok","auth":"validate Core JWT at module boundary"}}';
    }

    location /v1/fiscal/ {
        return 200 '{"success":true,"data":{"module":"finance-fiscal","squad":2,"message":"Stub endpoint — no local login"}}';
    }

    location = /v1/crm/health {
        return 200 '{"success":true,"data":{"module":"crm-leads","squad":3,"status":"ok","auth":"validate Core JWT at module boundary"}}';
    }

    location /v1/crm/ {
        return 200 '{"success":true,"data":{"module":"crm-leads","squad":3,"message":"Stub endpoint — no local login"}}';
    }

    location = /v1/service-desk/health {
        return 200 '{"success":true,"data":{"module":"service-desk","squad":4,"status":"ok","auth":"validate Core JWT at module boundary"}}';
    }

    location /v1/service-desk/ {
        return 200 '{"success":true,"data":{"module":"service-desk","squad":4,"message":"Stub endpoint — no local login"}}';
    }

    location ~ ^/v1/(fiscal|crm|service-desk)/auth/login$ {
        return 403 '{"success":false,"error":{"code":"AUTH_LOGIN_FORBIDDEN","message":"Login is only allowed via Core POST /v1/auth/login"}}';
    }
}
