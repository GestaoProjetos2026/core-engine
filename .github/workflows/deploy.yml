name: Deploy Core Auth

on:
  push:
    branches: [ "main" ]

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build e Push do Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/erp-backend:latest

      # Build e Push do Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./Frontend
          file: ./Frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/erp-frontend:latest
          build-args: |
            VITE_API_URL=http://${{ secrets.VM_HOST }}:8080

      # Deploy na VM via SSH usando Docker Compose
      - name: Deploy to VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Criar diretório do projeto se não existir
            mkdir -p ~/erp-project
            cd ~/erp-project

            # Login no Docker Hub na VM
            echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Pull das novas imagens
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/erp-backend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/erp-frontend:latest

            # Aqui assumimos que o docker-compose.yml está no servidor.
            # Alternativa: Criar o arquivo dinamicamente para garantir que está atualizado
            cat <<EOF > docker-compose.yml
            services:
              postgres:
                image: postgres:16
                container_name: erp-postgres
                restart: always
                environment:
                  POSTGRES_DB: erp_core
                  POSTGRES_USER: admin
                  POSTGRES_PASSWORD: admin123
                ports:
                  - "5433:5432"
                networks:
                  - erp-network

              redis:
                image: redis:7
                container_name: erp-redis
                restart: always
                ports:
                  - "6379:6379"
                networks:
                  - erp-network

              backend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/erp-backend:latest
                container_name: erp-backend
                restart: always
                environment:
                  - DATABASE_URL=postgresql://admin:admin123@postgres:5432/erp_core?schema=public
                  - REDIS_URL=redis://redis:6379
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                  - NODE_ENV=production
                ports:
                  - "8080:3000"
                depends_on:
                  - postgres
                  - redis
                networks:
                  - erp-network

              frontend:
                image: ${{ secrets.DOCKERHUB_USERNAME }}/erp-frontend:latest
                container_name: erp-frontend
                restart: always
                ports:
                  - "80:80"
                depends_on:
                  - backend
                networks:
                  - erp-network

            networks:
              erp-network:
                driver: bridge
            EOF

            # Reiniciar os serviços
            docker-compose down
            docker-compose up -d
            
            # Limpeza de imagens antigas
            docker image prune -f
