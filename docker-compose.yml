services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: erp_core
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    # Host 5433 avoids clash when another Postgres already uses 5432 locally
    ports:
      - "5433:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"