services:
  postgres:
    image: postgres:16
    container_name: erp-postgres
    restart: always
    environment:
      POSTGRES_DB: erp_core
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    networks:
      - erp-network

  redis:
    image: redis:7
    container_name: erp-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - erp-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://admin:admin123@postgres:5432/erp_core?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-in-production}
      - NODE_ENV=production
    ports:
      - "8080:3000"
    depends_on:
      - postgres
      - redis
    networks:
      - erp-network

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://40.82.176.176:8080
    container_name: erp-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - erp-network

networks:
  erp-network:
    driver: bridge